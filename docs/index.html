<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIMA Navigator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e13;
  --surface: #13161d;
  --surface-2: #1a1e28;
  --border: #252a36;
  --border-light: #323848;
  --text: #e2e6ef;
  --text-muted: #8a92a6;
  --text-dim: #5a6178;

  --detect: #e85d3a;
  --detect-bg: rgba(232,93,58,0.10);
  --detect-border: rgba(232,93,58,0.35);

  --inform: #4aa8d8;
  --inform-bg: rgba(74,168,216,0.10);
  --inform-border: rgba(74,168,216,0.35);

  --memorise: #9b6dd7;
  --memorise-bg: rgba(155,109,215,0.10);
  --memorise-border: rgba(155,109,215,0.35);

  --act: #3cc77a;
  --act-bg: rgba(60,199,122,0.10);
  --act-border: rgba(60,199,122,0.35);

  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'Source Sans 3', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
}

a { color: var(--inform); text-decoration: none; }
a:hover { text-decoration: underline; }

/* HEADER */
.header {
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(12,14,19,0.92);
  backdrop-filter: blur(10px);
}
.logo {
  font-family: var(--font-mono);
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  background: linear-gradient(135deg, var(--detect), var(--inform), var(--memorise), var(--act));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo-sub {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-left: 12px;
  letter-spacing: 0.05em;
}
.header-right { display: flex; align-items: center; gap: 14px; }
.search-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.92rem;
  width: 280px;
  outline: none;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--text-dim); }
.search-box::placeholder { color: var(--text-dim); }
.match-count {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  min-width: 70px;
}

/* MAIN GRID */
.matrix {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 18px;
  padding: 22px 28px 60px;
}
@media (max-width: 1100px) { .matrix { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 640px)  { .matrix { grid-template-columns: 1fr; } }

.column { display: flex; flex-direction: column; gap: 14px; }

.phase-header {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  padding: 10px 14px;
  border-radius: 6px;
  border: 1px solid;
  text-transform: uppercase;
  position: sticky;
  top: 78px;
  z-index: 10;
  backdrop-filter: blur(8px);
}
.column.detect   .phase-header { color: var(--detect);   background: var(--detect-bg);   border-color: var(--detect-border); }
.column.inform   .phase-header { color: var(--inform);   background: var(--inform-bg);   border-color: var(--inform-border); }
.column.memorise .phase-header { color: var(--memorise); background: var(--memorise-bg); border-color: var(--memorise-border); }
.column.act      .phase-header { color: var(--act);      background: var(--act-bg);      border-color: var(--act-border); }

/* TACTIC CARD */
.tactic {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: 6px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.column.detect   .tactic { border-left-color: var(--detect); }
.column.inform   .tactic { border-left-color: var(--inform); }
.column.memorise .tactic { border-left-color: var(--memorise); }
.column.act      .tactic { border-left-color: var(--act); }

.tactic-header { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.tactic-id {
  font-family: var(--font-mono);
  font-size: 0.74rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.tactic-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.tactic-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

.techniques { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
.technique {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 7px 10px;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: baseline;
  gap: 8px;
  transition: border-color 0.15s, background 0.15s;
}
.technique:hover { border-color: var(--border-light); background: #1f2330; }
.technique-id {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-dim);
  font-weight: 600;
  flex-shrink: 0;
}
.technique-name { color: var(--text); flex: 1; }

.hidden { display: none !important; }

/* DETAIL PANEL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.overlay.open { display: flex; }
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-width: 720px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 22px 26px;
  position: relative;
}
.panel-close {
  position: absolute;
  top: 12px;
  right: 14px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 1.1rem;
  width: 28px; height: 28px;
  border-radius: 4px;
  cursor: pointer;
  line-height: 1;
}
.panel-close:hover { color: var(--text); border-color: var(--border-light); }

.panel-meta {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.panel-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 14px; }
.panel-desc { font-size: 0.95rem; color: var(--text); line-height: 1.55; margin-bottom: 18px; white-space: pre-wrap; }

.section { margin-top: 16px; }
.section-title {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.section-text { font-size: 0.9rem; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
.section-list { list-style: none; padding-left: 0; }
.section-list li {
  font-size: 0.9rem;
  color: var(--text);
  padding: 4px 0 4px 16px;
  position: relative;
  line-height: 1.45;
}
.section-list li::before {
  content: "•";
  position: absolute;
  left: 0;
  color: var(--text-dim);
}

.error {
  padding: 28px;
  color: var(--detect);
  font-family: var(--font-mono);
  font-size: 0.9rem;
}
.empty {
  padding: 8px 14px;
  color: var(--text-dim);
  font-size: 0.85rem;
  font-style: italic;
}

/* CAMPAIGN SELECTION */
.tech-check {
  appearance: none;
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border: 1px solid var(--border-light);
  border-radius: 3px;
  background: var(--surface);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: background 0.12s, border-color 0.12s;
}
.tech-check:hover { border-color: var(--text-dim); }
.tech-check:checked {
  background: var(--inform);
  border-color: var(--inform);
}
.tech-check:checked::after {
  content: "";
  position: absolute;
  left: 3px; top: 0px;
  width: 5px; height: 9px;
  border: solid #0c0e13;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.technique.selected {
  background: rgba(74,168,216,0.08);
  border-color: var(--inform-border);
}

.tactic-check {
  appearance: none;
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border: 1px solid var(--border-light);
  border-radius: 3px;
  background: var(--surface);
  cursor: pointer;
  flex-shrink: 0;
  margin-left: auto;
  position: relative;
  transition: background 0.12s, border-color 0.12s;
}
.tactic-check:hover { border-color: var(--text-dim); }
.tactic-check:checked,
.tactic-check:indeterminate {
  background: var(--inform);
  border-color: var(--inform);
}
.tactic-check:checked::after {
  content: "";
  position: absolute;
  left: 4px; top: 1px;
  width: 5px; height: 9px;
  border: solid #0c0e13;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.tactic-check:indeterminate::after {
  content: "";
  position: absolute;
  left: 3px; top: 7px;
  width: 9px; height: 2px;
  background: #0c0e13;
}

.campaign-chip {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--inform);
  background: var(--inform-bg);
  border: 1px solid var(--inform-border);
  padding: 5px 10px;
  border-radius: 4px;
  display: none;
}
.campaign-chip.visible { display: inline-block; }
.btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 0.85rem;
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn:hover { border-color: var(--text-dim); color: var(--text); }
.btn.primary { color: var(--inform); border-color: var(--inform-border); }
.btn.primary:hover { background: var(--inform-bg); }
.btn[disabled] { opacity: 0.4; cursor: not-allowed; }
.btn[disabled]:hover { border-color: var(--border); color: var(--text-muted); background: transparent; }

/* Details inlined into each technique, hidden on screen, revealed in print */
.technique-details { display: none; }

/* REPORT MODAL */
.report-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 110;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.report-overlay.open { display: flex; }
.report-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-width: 820px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px 28px;
  position: relative;
}
.report-panel h2 { font-size: 1.2rem; margin-bottom: 16px; }
.report-panel label {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin: 14px 0 6px;
}
.report-panel input[type=text],
.report-panel input[type=date],
.report-panel textarea {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  padding: 8px 10px;
  font-family: var(--font-body);
  font-size: 0.92rem;
  outline: none;
}
.report-panel textarea { resize: vertical; min-height: 70px; }
.report-panel input:focus,
.report-panel textarea:focus { border-color: var(--text-dim); }

.report-tech-list {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.report-tech {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--inform);
  border-radius: 4px;
  padding: 10px 12px;
}
.report-tech-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 6px;
}
.report-tech-id {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-muted);
}
.report-tech-name { font-weight: 600; flex: 1; }
.report-tech-remove {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.75rem;
  padding: 3px 8px;
  border-radius: 3px;
  cursor: pointer;
}
.report-tech-remove:hover { color: var(--detect); border-color: var(--detect-border); }

.report-actions {
  margin-top: 22px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* PRINTABLE REPORT (rendered hidden, revealed when body.printing-report) */
.report-printable { display: none; }

/* PRINT — matrice complete (mode par defaut, bouton PDF du header) */
@media print {
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #ffffff;
    --border: #cccccc;
    --border-light: #999999;
    --text: #111111;
    --text-muted: #444444;
    --text-dim: #666666;
  }
  html { font-size: 11pt; }
  body { background: #fff; color: #111; }
  .header,
  .overlay,
  .report-overlay { display: none !important; }
  a { color: #0a4a8a; text-decoration: underline; }

  .matrix {
    display: block;
    padding: 0;
    gap: 0;
  }
  .column {
    display: block;
    break-before: page;
    page-break-before: always;
  }
  .column:first-child {
    break-before: auto;
    page-break-before: auto;
  }

  .phase-header {
    position: static;
    backdrop-filter: none;
    font-size: 16pt;
    margin-bottom: 12pt;
    padding: 8pt 10pt;
    border-width: 2pt;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .column.detect   .phase-header { color: #b03c1c; background: #fff3ee; border-color: #b03c1c; }
  .column.inform   .phase-header { color: #1c6a96; background: #eef7fc; border-color: #1c6a96; }
  .column.memorise .phase-header { color: #6843a8; background: #f4eefb; border-color: #6843a8; }
  .column.act      .phase-header { color: #1f8a4f; background: #ecfaf1; border-color: #1f8a4f; }

  .tactic {
    background: #fff;
    border: 1pt solid #888;
    border-left-width: 3pt;
    padding: 8pt 10pt;
    margin-bottom: 8pt;
    page-break-inside: avoid;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .column.detect   .tactic { border-left-color: #b03c1c; }
  .column.inform   .tactic { border-left-color: #1c6a96; }
  .column.memorise .tactic { border-left-color: #6843a8; }
  .column.act      .tactic { border-left-color: #1f8a4f; }

  .tactic-id { color: #555; font-size: 9pt; }
  .tactic-name { font-size: 12pt; }
  .tactic-desc { color: #333; font-size: 10pt; }
  .tactic-check, .tech-check { display: none !important; }

  .technique {
    background: #fff;
    border: 1pt solid #ccc;
    page-break-inside: avoid;
    cursor: default;
    display: block;
    padding: 6pt 8pt;
    margin-top: 4pt;
  }
  .technique-id { color: #555; font-size: 9pt; }
  .technique-name { color: #111; font-weight: 600; }

  .technique-details {
    display: block;
    padding-top: 4pt;
    color: #222;
  }
  .technique-details .desc { font-size: 10pt; line-height: 1.4; margin-top: 4pt; }
  .technique-details .section { margin-top: 6pt; }
  .technique-details .section-title { color: #444; font-size: 8.5pt; }
  .technique-details .section-text { color: #222; font-size: 9.5pt; }
  .technique-details .section-list li { color: #222; font-size: 9.5pt; }
  .technique-details .section-list li::before { color: #666; }

  .hidden { display: block !important; } /* en print on ignore le filtre */

  /* PRINT — rapport de campagne (active quand body.printing-report) */
  body.printing-report .header,
  body.printing-report .matrix,
  body.printing-report .overlay,
  body.printing-report .report-overlay { display: none !important; }
  body.printing-report .report-printable {
    display: block;
    color: #111;
    background: #fff;
    font-family: var(--font-body);
    padding: 0;
  }
  body.printing-report a { color: #0a4a8a; text-decoration: underline; }
  body.printing-report .report-printable h1 {
    font-size: 22pt;
    margin-bottom: 4pt;
    border-bottom: 2pt solid #111;
    padding-bottom: 6pt;
  }
  body.printing-report .report-printable .meta {
    font-size: 10pt;
    color: #444;
    margin-bottom: 14pt;
  }
  body.printing-report .report-printable .global-notes {
    background: #f6f6f6;
    border-left: 3pt solid #999;
    padding: 8pt 12pt;
    margin-bottom: 18pt;
    font-size: 10.5pt;
    white-space: pre-wrap;
  }
  body.printing-report .report-printable h2 {
    font-size: 14pt;
    margin: 16pt 0 6pt;
    color: #111;
    border-bottom: 1pt solid #999;
    padding-bottom: 3pt;
  }
  body.printing-report .report-printable .r-tech {
    page-break-inside: avoid;
    break-inside: avoid;
    border: 1pt solid #999;
    border-left: 3pt solid #1c6a96;
    padding: 8pt 10pt;
    margin-bottom: 10pt;
  }
  body.printing-report .report-printable .r-tech .r-id {
    font-family: var(--font-mono);
    font-size: 9pt;
    color: #555;
  }
  body.printing-report .report-printable .r-tech .r-name {
    font-size: 12pt;
    font-weight: 600;
    margin-bottom: 4pt;
  }
  body.printing-report .report-printable .r-tech .r-phase {
    font-family: var(--font-mono);
    font-size: 8.5pt;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  body.printing-report .report-printable .r-tech .r-desc {
    font-size: 10pt;
    line-height: 1.4;
    margin: 6pt 0;
  }
  body.printing-report .report-printable .r-tech .r-section { margin-top: 6pt; }
  body.printing-report .report-printable .r-tech .r-section-title {
    font-family: var(--font-mono);
    font-size: 8.5pt;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  body.printing-report .report-printable .r-tech .r-section li,
  body.printing-report .report-printable .r-tech .r-section .r-text {
    font-size: 9.5pt;
    color: #222;
    line-height: 1.4;
  }
  body.printing-report .report-printable .r-tech .r-obs {
    margin-top: 8pt;
    padding: 6pt 10pt;
    background: #fffbe6;
    border-left: 3pt solid #d4a900;
    font-size: 10pt;
    white-space: pre-wrap;
  }
  body.printing-report .report-printable .r-tech .r-obs-label {
    font-family: var(--font-mono);
    font-size: 8.5pt;
    color: #6a5400;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 3pt;
  }

  @page { size: A4; margin: 14mm 14mm 16mm; }
}
</style>
</head>
<body>

<header class="header">
  <div>
    <span class="logo">DIMA</span>
    <span class="logo-sub">Detect · Inform · Memorise · Act</span>
  </div>
  <div class="header-right">
    <span class="match-count" id="match-count"></span>
    <input type="search" class="search-box" id="search" placeholder="Rechercher (id, nom, description)…" />
    <span class="campaign-chip" id="campaign-chip"></span>
    <button class="btn" id="clear-btn" disabled>Effacer</button>
    <button class="btn primary" id="report-btn" disabled>Rapport</button>
    <button class="btn" id="print-btn" title="Imprimer la matrice complete en PDF">⎙ PDF</button>
  </div>
</header>

<main class="matrix" id="matrix"></main>

<div class="overlay" id="overlay">
  <div class="panel" id="panel">
    <button class="panel-close" id="panel-close" aria-label="Fermer">×</button>
    <div class="panel-meta" id="panel-meta"></div>
    <h2 class="panel-title" id="panel-title"></h2>
    <p class="panel-desc" id="panel-desc"></p>
    <div id="panel-sections"></div>
  </div>
</div>

<div class="report-overlay" id="report-overlay">
  <div class="report-panel">
    <button class="panel-close" id="report-close" aria-label="Fermer">×</button>
    <h2>Rapport de campagne</h2>

    <label for="rep-name">Nom de la campagne</label>
    <input type="text" id="rep-name" placeholder="ex. Influence pré-électorale 2026" />

    <label for="rep-date">Période d'observation</label>
    <input type="text" id="rep-date" placeholder="ex. avril–mai 2026" />

    <label for="rep-notes">Contexte général</label>
    <textarea id="rep-notes" placeholder="Description de la campagne, acteurs, vecteurs, sources…"></textarea>

    <label>Techniques sélectionnées</label>
    <div class="report-tech-list" id="rep-list"></div>

    <div class="report-actions">
      <button class="btn" id="report-cancel">Fermer</button>
      <button class="btn" id="report-import">Importer JSON</button>
      <button class="btn" id="report-json">Exporter JSON</button>
      <button class="btn primary" id="report-print">Imprimer / PDF</button>
    </div>
    <input type="file" id="report-import-file" accept="application/json,.json" hidden />
  </div>
</div>

<div class="report-printable" id="report-printable" aria-hidden="true"></div>

<script>
const PHASES = [
  { key: "DETECT",   label: "Detect",   className: "detect"   },
  { key: "INFORM",   label: "Inform",   className: "inform"   },
  { key: "MEMORISE", label: "Memorise", className: "memorise" },
  { key: "ACT",      label: "Act",      className: "act"      },
];

const matrixEl = document.getElementById("matrix");
const searchEl = document.getElementById("search");
const matchCountEl = document.getElementById("match-count");
const overlay = document.getElementById("overlay");
const panelMeta = document.getElementById("panel-meta");
const panelTitle = document.getElementById("panel-title");
const panelDesc = document.getElementById("panel-desc");
const panelSections = document.getElementById("panel-sections");

const allTechniques = []; // index aplati pour resoudre un id depuis la barre de recherche

// CAMPAIGN STATE
const STORAGE_KEY = "dima.campaign.v1";
const selected = new Set();
const techNotes = {};   // techId -> texte d'observation
let campaignName = "";
let campaignDate = "";
let campaignNotes = "";

function loadSelection() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    (data.selected || []).forEach((id) => selected.add(id));
    Object.assign(techNotes, data.techNotes || {});
    campaignName  = data.name  || "";
    campaignDate  = data.date  || "";
    campaignNotes = data.notes || "";
  } catch { /* ignore */ }
}
function saveSelection() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      selected: [...selected],
      techNotes,
      name: campaignName,
      date: campaignDate,
      notes: campaignNotes,
    }));
  } catch { /* quota / disabled */ }
}
loadSelection();

function autoLink(text) {
  // Markdown-style links [label](url) deja dans le contenu, plus URLs nues
  const md = /\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g;
  let escaped = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
  escaped = escaped.replace(md, (_, label, url) =>
    `<a href="${url}" target="_blank" rel="noopener">${label}</a>`
  );
  // URLs nues qui n'etaient pas dans un [..](..)
  const bare = /(^|[^"'>])(https?:\/\/[^\s<)]+)(?![^<]*<\/a>)/g;
  escaped = escaped.replace(bare, (_, prefix, url) =>
    `${prefix}<a href="${url}" target="_blank" rel="noopener">${url}</a>`
  );
  return escaped;
}

function syncTacticCheck(tacticCheck, techChecks) {
  if (!techChecks.length) {
    tacticCheck.checked = false;
    tacticCheck.indeterminate = false;
    return;
  }
  const total = techChecks.length;
  const checked = techChecks.reduce((n, c) => n + (c.checked ? 1 : 0), 0);
  tacticCheck.checked = checked === total;
  tacticCheck.indeterminate = checked > 0 && checked < total;
}

function syncAllTacticChecks() {
  for (const card of document.querySelectorAll(".tactic")) {
    const tac = card.querySelector(".tactic-check");
    const techs = [...card.querySelectorAll(".tech-check")];
    if (tac) syncTacticCheck(tac, techs);
  }
}

function renderSection(sec) {
  const wrapper = document.createElement("div");
  wrapper.className = "section";
  const title = document.createElement("div");
  title.className = "section-title";
  title.textContent = sec.title;
  wrapper.appendChild(title);

  if (sec.text) {
    const p = document.createElement("div");
    p.className = "section-text";
    p.innerHTML = autoLink(sec.text);
    wrapper.appendChild(p);
  }
  if (Array.isArray(sec.items) && sec.items.length) {
    const ul = document.createElement("ul");
    ul.className = "section-list";
    for (const item of sec.items) {
      const li = document.createElement("li");
      li.innerHTML = autoLink(item);
      ul.appendChild(li);
    }
    wrapper.appendChild(ul);
  }
  return wrapper;
}

function openPanel(tech, tactic, phase) {
  panelMeta.textContent = `${phase.label} · ${tactic.id} ${tactic.name}`;
  panelTitle.textContent = `${tech.id} · ${tech.name}`;
  panelDesc.innerHTML = tech.description ? autoLink(tech.description) : "";
  panelSections.innerHTML = "";
  for (const sec of tech.sections || []) {
    panelSections.appendChild(renderSection(sec));
  }
  overlay.classList.add("open");
}

function closePanel() { overlay.classList.remove("open"); }

overlay.addEventListener("click", (e) => { if (e.target === overlay) closePanel(); });
document.getElementById("panel-close").addEventListener("click", closePanel);
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (reportOverlay.classList.contains("open")) closeReport();
  else closePanel();
});

document.getElementById("print-btn").addEventListener("click", () => {
  closePanel();
  window.print();
});

function buildPhaseColumn(phase, data) {
  const col = document.createElement("section");
  col.className = `column ${phase.className}`;
  col.dataset.phase = phase.key;

  const header = document.createElement("div");
  header.className = "phase-header";
  const tacCount = data.tactics.length;
  const techCount = data.tactics.reduce((n, t) => n + (t.techniques?.length || 0), 0);
  header.textContent = `${phase.label} — ${tacCount} TA · ${techCount} TE`;
  col.appendChild(header);

  for (const tactic of data.tactics) {
    const card = document.createElement("article");
    card.className = "tactic";
    card.dataset.id = tactic.id;
    card.dataset.name = (tactic.name || "").toLowerCase();
    card.dataset.desc = (tactic.description || "").toLowerCase();

    const head = document.createElement("div");
    head.className = "tactic-header";
    const idEl = document.createElement("span");
    idEl.className = "tactic-id";
    idEl.textContent = tactic.id;
    const nameEl = document.createElement("span");
    nameEl.className = "tactic-name";
    nameEl.textContent = tactic.name;
    const tacticCheck = document.createElement("input");
    tacticCheck.type = "checkbox";
    tacticCheck.className = "tactic-check";
    tacticCheck.title = "Cocher toutes les techniques de cette tactique";
    head.append(idEl, nameEl, tacticCheck);
    card.appendChild(head);

    const techChecks = [];

    if (tactic.description) {
      const desc = document.createElement("div");
      desc.className = "tactic-desc";
      desc.innerHTML = autoLink(tactic.description);
      card.appendChild(desc);
    }

    const techs = document.createElement("div");
    techs.className = "techniques";
    if (!tactic.techniques?.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "(aucune technique)";
      techs.appendChild(empty);
    }
    for (const tech of tactic.techniques || []) {
      const item = document.createElement("div");
      item.className = "technique";
      item.dataset.id = tech.id;
      item.dataset.name = (tech.name || "").toLowerCase();
      item.dataset.desc = (tech.description || "").toLowerCase();

      const check = document.createElement("input");
      check.type = "checkbox";
      check.className = "tech-check";
      check.title = "Ajouter à la campagne";
      check.checked = selected.has(tech.id);
      check.addEventListener("click", (e) => e.stopPropagation());
      check.addEventListener("change", () => {
        if (check.checked) selected.add(tech.id);
        else selected.delete(tech.id);
        item.classList.toggle("selected", check.checked);
        syncTacticCheck(tacticCheck, techChecks);
        saveSelection();
        updateCampaignUI();
      });

      const tid = document.createElement("span");
      tid.className = "technique-id";
      tid.textContent = tech.id;
      const tname = document.createElement("span");
      tname.className = "technique-name";
      tname.textContent = tech.name;
      item.append(check, tid, tname);
      item.addEventListener("click", () => openPanel(tech, tactic, phase));
      if (selected.has(tech.id)) item.classList.add("selected");

      // Details rendus inline (caches a l'ecran, reveles a l'impression)
      const details = document.createElement("div");
      details.className = "technique-details";
      if (tech.description) {
        const desc = document.createElement("div");
        desc.className = "desc";
        desc.innerHTML = autoLink(tech.description);
        details.appendChild(desc);
      }
      for (const sec of tech.sections || []) {
        details.appendChild(renderSection(sec));
      }
      item.appendChild(details);

      techs.appendChild(item);
      techChecks.push(check);
      allTechniques.push({ tech, tactic, phase, el: item, check });
    }
    card.appendChild(techs);
    col.appendChild(card);

    syncTacticCheck(tacticCheck, techChecks);
    tacticCheck.addEventListener("click", (e) => e.stopPropagation());
    tacticCheck.addEventListener("change", () => {
      const target = tacticCheck.checked;
      for (const c of techChecks) {
        if (c.checked === target) continue;
        c.checked = target;
        c.dispatchEvent(new Event("change"));
      }
      syncTacticCheck(tacticCheck, techChecks);
    });
  }

  return col;
}

function applyFilter(query) {
  const q = query.trim().toLowerCase();
  let visibleTechs = 0;
  let visibleTacs = 0;

  for (const card of document.querySelectorAll(".tactic")) {
    const tacMatch = !q ||
      card.dataset.id.toLowerCase().includes(q) ||
      card.dataset.name.includes(q) ||
      card.dataset.desc.includes(q);

    let anyTechVisible = false;
    for (const item of card.querySelectorAll(".technique")) {
      const techMatch = !q ||
        tacMatch ||
        item.dataset.id.toLowerCase().includes(q) ||
        item.dataset.name.includes(q) ||
        item.dataset.desc.includes(q);
      item.classList.toggle("hidden", !techMatch);
      if (techMatch) { anyTechVisible = true; visibleTechs += 1; }
    }

    const showCard = tacMatch || anyTechVisible;
    card.classList.toggle("hidden", !showCard);
    if (showCard) visibleTacs += 1;
  }

  matchCountEl.textContent = q ? `${visibleTacs} TA · ${visibleTechs} TE` : "";
}

searchEl.addEventListener("input", (e) => applyFilter(e.target.value));

// CAMPAIGN UI
const chipEl = document.getElementById("campaign-chip");
const clearBtn = document.getElementById("clear-btn");
const reportBtn = document.getElementById("report-btn");
const reportOverlay = document.getElementById("report-overlay");
const repName = document.getElementById("rep-name");
const repDate = document.getElementById("rep-date");
const repNotes = document.getElementById("rep-notes");
const repList = document.getElementById("rep-list");
const reportPrintable = document.getElementById("report-printable");

function updateCampaignUI() {
  const n = selected.size;
  if (n > 0) {
    chipEl.textContent = `Campagne : ${n} TE`;
    chipEl.classList.add("visible");
    clearBtn.disabled = false;
    reportBtn.disabled = false;
  } else {
    chipEl.classList.remove("visible");
    clearBtn.disabled = true;
    reportBtn.disabled = true;
  }
}

clearBtn.addEventListener("click", () => {
  if (!selected.size) return;
  if (!confirm("Effacer la sélection actuelle ?")) return;
  selected.clear();
  for (const t of allTechniques) {
    t.check.checked = false;
    t.el.classList.remove("selected");
  }
  syncAllTacticChecks();
  saveSelection();
  updateCampaignUI();
});

function openReport() {
  repName.value  = campaignName;
  repDate.value  = campaignDate;
  repNotes.value = campaignNotes;
  repList.innerHTML = "";

  const items = allTechniques
    .filter((t) => selected.has(t.tech.id))
    .sort((a, b) => a.tech.id.localeCompare(b.tech.id));

  for (const { tech, tactic, phase } of items) {
    const row = document.createElement("div");
    row.className = "report-tech";

    const head = document.createElement("div");
    head.className = "report-tech-head";

    const idEl = document.createElement("span");
    idEl.className = "report-tech-id";
    idEl.textContent = `${phase.label} · ${tech.id}`;

    const nameEl = document.createElement("span");
    nameEl.className = "report-tech-name";
    nameEl.textContent = tech.name;

    const removeBtn = document.createElement("button");
    removeBtn.className = "report-tech-remove";
    removeBtn.type = "button";
    removeBtn.textContent = "Retirer";
    removeBtn.addEventListener("click", () => {
      selected.delete(tech.id);
      delete techNotes[tech.id];
      const ref = allTechniques.find((t) => t.tech.id === tech.id);
      if (ref) { ref.check.checked = false; ref.el.classList.remove("selected"); }
      syncAllTacticChecks();
      saveSelection();
      updateCampaignUI();
      row.remove();
      if (!selected.size) closeReport();
    });

    head.append(idEl, nameEl, removeBtn);
    row.appendChild(head);

    const obs = document.createElement("textarea");
    obs.placeholder = "Observation pour cette technique dans la campagne…";
    obs.value = techNotes[tech.id] || "";
    obs.addEventListener("input", () => {
      techNotes[tech.id] = obs.value;
      saveSelection();
    });
    row.appendChild(obs);

    repList.appendChild(row);
  }

  reportOverlay.classList.add("open");
}

function closeReport() {
  campaignName  = repName.value;
  campaignDate  = repDate.value;
  campaignNotes = repNotes.value;
  saveSelection();
  reportOverlay.classList.remove("open");
}

reportBtn.addEventListener("click", openReport);
document.getElementById("report-cancel").addEventListener("click", closeReport);
document.getElementById("report-close").addEventListener("click", closeReport);
reportOverlay.addEventListener("click", (e) => { if (e.target === reportOverlay) closeReport(); });

[repName, repDate, repNotes].forEach((el) => {
  el.addEventListener("input", () => {
    campaignName  = repName.value;
    campaignDate  = repDate.value;
    campaignNotes = repNotes.value;
    saveSelection();
  });
});

function buildPrintableReport() {
  const items = allTechniques
    .filter((t) => selected.has(t.tech.id))
    .sort((a, b) => a.tech.id.localeCompare(b.tech.id));

  const esc = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const parts = [];

  parts.push(`<h1>${esc(campaignName) || "Rapport DIMA"}</h1>`);
  const metaBits = [];
  if (campaignDate) metaBits.push(esc(campaignDate));
  metaBits.push(`${items.length} technique${items.length > 1 ? "s" : ""}`);
  metaBits.push(`Généré le ${new Date().toLocaleDateString("fr-FR")}`);
  parts.push(`<div class="meta">${metaBits.join(" · ")}</div>`);

  if (campaignNotes.trim()) {
    parts.push(`<div class="global-notes">${esc(campaignNotes)}</div>`);
  }

  parts.push(`<h2>Techniques observées</h2>`);

  for (const { tech, tactic, phase } of items) {
    const sectionsHtml = (tech.sections || []).map((sec) => {
      const itemsHtml = (sec.items || []).length
        ? `<ul>${sec.items.map((i) => `<li>${autoLink(i)}</li>`).join("")}</ul>`
        : "";
      const textHtml = sec.text ? `<div class="r-text">${autoLink(sec.text)}</div>` : "";
      return `<div class="r-section"><div class="r-section-title">${esc(sec.title)}</div>${textHtml}${itemsHtml}</div>`;
    }).join("");

    const obs = (techNotes[tech.id] || "").trim();
    const obsHtml = obs
      ? `<div class="r-obs"><div class="r-obs-label">Observation</div>${esc(obs)}</div>`
      : "";

    parts.push(`
      <div class="r-tech">
        <div class="r-phase">${esc(phase.label)} · ${esc(tactic.id)} ${esc(tactic.name)}</div>
        <div class="r-id">${esc(tech.id)}</div>
        <div class="r-name">${esc(tech.name)}</div>
        ${tech.description ? `<div class="r-desc">${autoLink(tech.description)}</div>` : ""}
        ${sectionsHtml}
        ${obsHtml}
      </div>
    `);
  }

  reportPrintable.innerHTML = parts.join("");
}

function slugify(s) {
  return (s || "campagne-dima")
    .toString()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 60) || "campagne-dima";
}

function buildCampaignJSON() {
  const items = allTechniques
    .filter((t) => selected.has(t.tech.id))
    .sort((a, b) => a.tech.id.localeCompare(b.tech.id));

  return {
    title: campaignName || "Rapport DIMA",
    date: campaignDate,
    notes: campaignNotes,
    generated_at: new Date().toISOString(),
    techniques: items.map(({ tech, tactic, phase }) => ({
      id: tech.id,
      name: tech.name,
      phase: phase.key,
      tactic_id: tactic.id,
      tactic_name: tactic.name,
      description: tech.description || "",
      sections: tech.sections || [],
      observation: techNotes[tech.id] || "",
    })),
  };
}

const importBtn = document.getElementById("report-import");
const importFile = document.getElementById("report-import-file");

importBtn.addEventListener("click", () => importFile.click());

importFile.addEventListener("change", async () => {
  const file = importFile.files?.[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!Array.isArray(data.techniques)) {
      throw new Error("format invalide (techniques[] manquant)");
    }
    const knownIds = new Set(allTechniques.map((t) => t.tech.id));
    const importedIds = data.techniques.map((t) => t.id).filter((id) => knownIds.has(id));
    const unknown = data.techniques.length - importedIds.length;

    const replace = !selected.size || confirm(
      `Importer ${importedIds.length} technique(s)${unknown ? ` (${unknown} inconnue(s) ignoree(s))` : ""} ?\nLa selection actuelle sera remplacee.`
    );
    if (!replace) { importFile.value = ""; return; }

    selected.clear();
    Object.keys(techNotes).forEach((k) => delete techNotes[k]);
    for (const t of data.techniques) {
      if (!knownIds.has(t.id)) continue;
      selected.add(t.id);
      if (t.observation) techNotes[t.id] = t.observation;
    }
    campaignName  = data.title || "";
    campaignDate  = data.date  || "";
    campaignNotes = data.notes || "";

    // Sync UI: cases a cocher, marqueurs, formulaire
    for (const t of allTechniques) {
      const sel = selected.has(t.tech.id);
      t.check.checked = sel;
      t.el.classList.toggle("selected", sel);
    }
    syncAllTacticChecks();
    saveSelection();
    updateCampaignUI();
    openReport();
  } catch (err) {
    alert(`Import echoue: ${err.message}`);
  } finally {
    importFile.value = "";
  }
});

document.getElementById("report-json").addEventListener("click", () => {
  campaignName  = repName.value;
  campaignDate  = repDate.value;
  campaignNotes = repNotes.value;
  saveSelection();

  const payload = buildCampaignJSON();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${slugify(payload.title)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

document.getElementById("report-print").addEventListener("click", () => {
  campaignName  = repName.value;
  campaignDate  = repDate.value;
  campaignNotes = repNotes.value;
  saveSelection();
  buildPrintableReport();
  document.body.classList.add("printing-report");
  window.print();
});

window.addEventListener("afterprint", () => {
  document.body.classList.remove("printing-report");
});

async function load() {
  try {
    const results = await Promise.all(
      PHASES.map((p) =>
        fetch(`data/${p.key}.json`).then((r) => {
          if (!r.ok) throw new Error(`${p.key}: HTTP ${r.status}`);
          return r.json();
        })
      )
    );
    matrixEl.innerHTML = "";
    PHASES.forEach((phase, i) => matrixEl.appendChild(buildPhaseColumn(phase, results[i])));
    updateCampaignUI();
  } catch (err) {
    matrixEl.innerHTML = `<div class="error">Erreur de chargement: ${err.message}<br>Servir le dossier <code>docs/</code> via un serveur HTTP (les fetch ne fonctionnent pas en file://).</div>`;
  }
}

load();
</script>
</body>
</html>
